# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: 'en'
reviews:
  profile: 'assertive'
  high_level_summary: false
  changed_files_summary: true
  poem: false
  review_status: false
  collapse_walkthrough: true
  request_changes_workflow: true
  sequence_diagrams: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  assess_linked_issues: false
  path_instructions:
    - path: '**/*.ts,**/*.tsx'
      instructions: |
        Review the TypeScript/React code for:
        - Possible bugs and unhandled edge cases
        - Performance issues and unnecessary re-renders
        - Type safety improvements
        - Clean code principles and readability
        - Security vulnerabilities
    - path: '**/*.test.ts,**/*.test.tsx'
      instructions: |
        Review tests for:
        - Missing edge case coverage
        - Proper assertion usage
        - Test isolation and mocking correctness
  auto_review:
    enabled: true
    drafts: false
  tools:
    eslint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
